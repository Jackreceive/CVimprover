services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intern_match
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intern_match"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/intern_match
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/resumes
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    volumes:
      - resume_storage:/data/resumes

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/intern_match
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/resumes
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - resume_storage:/data/resumes

volumes:
  postgres_data:
  resume_storage:
